<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b8ff8"/>
      <stop offset="100%" stop-color="#3d25c9"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="256" cy="256" r="248"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <circle cx="256" cy="256" r="256" fill="url(#shine)"/>
  <!-- Subtle inner ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Eighth note (♪) — white, centered slightly left -->
  <!-- Note head: tilted filled ellipse -->
  <ellipse cx="200" cy="348" rx="72" ry="52" fill="white" transform="rotate(-18 200 348)"/>

  <!-- Stem: right edge of note head upward -->
  <rect x="258" y="148" width="26" height="210" rx="13" fill="white"/>

  <!-- Flag: curves right then sweeps back down -->
  <path d="M284 148
           C 350 168, 378 220, 378 268
           C 378 310, 355 335, 320 348
           C 355 318, 368 288, 360 248
           C 350 205, 326 178, 284 165
           Z"
        fill="white"/>

  <!-- Pencil / annotation mark — lower right, subtle -->
  <g transform="translate(310,370) rotate(-38)" opacity="0.92">
    <!-- Pencil body -->
    <rect x="0" y="0" width="18" height="68" rx="3" fill="white"/>
    <!-- Pencil tip -->
    <polygon points="0,68 18,68 9,90" fill="rgba(255,255,255,0.75)"/>
    <!-- Pencil eraser band -->
    <rect x="0" y="0" width="18" height="12" rx="3" fill="rgba(255,255,255,0.5)"/>
  </g>
</svg>
